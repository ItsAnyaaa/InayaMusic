<svg width="100%" height="400" viewBox="0 0 900 400" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <!-- Background -->
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#12002a"/>
      <stop offset="60%" stop-color="#050018"/>
      <stop offset="100%" stop-color="#000010"/>
    </radialGradient>

    <!-- Neon gradient -->
    <linearGradient id="neon" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f0ff"/>
      <stop offset="50%" stop-color="#7cff00"/>
      <stop offset="100%" stop-color="#00ffa2"/>
    </linearGradient>

    <!-- Glow filter -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="6"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Glass blur -->
    <filter id="glass">
      <feGaussianBlur stdDeviation="12"/>
    </filter>

    <style>
      @keyframes eq {
        0% { height: 40px }
        25% { height: 120px }
        50% { height: 70px }
        75% { height: 150px }
        100% { height: 50px }
      }

      @keyframes pulse {
        0% { r: 90; opacity: .45 }
        50% { r: 120; opacity: .2 }
        100% { r: 90; opacity: .45 }
      }

      @keyframes float {
        0%   { transform: translateY(0); opacity:0.6 }
        50%  { transform: translateY(-25px); opacity:1 }
        100% { transform: translateY(0); opacity:0.6 }
      }

      @keyframes ringSweep {
        0% { stroke-dashoffset: 0 }
        100% { stroke-dashoffset: 400 }
      }
    </style>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bg)"/>

  <!-- Floating particles -->
  <g fill="url(#neon)" filter="url(#glow)">
    <circle cx="140" cy="90" r="5" style="animation: float 3s infinite ease-in-out; animation-delay: .2s"/>
    <circle cx="760" cy="60" r="7" style="animation: float 4s infinite ease-in-out; animation-delay: .5s"/>
    <circle cx="850" cy="310" r="4" style="animation: float 3.5s infinite ease-in-out; animation-delay: .9s"/>
    <circle cx="120" cy="280" r="6" style="animation: float 4s infinite ease-in-out; animation-delay: 1.2s"/>
  </g>

  <!-- Center Glass Panel -->
  <g transform="translate(450,200)">
    <rect x="-240" y="-100" width="480" height="200" rx="32"
          fill="rgba(255,255,255,0.05)"
          stroke="url(#neon)" stroke-width="2"
          filter="url(#glass)"/>

    <!-- Pulse Ring with sweep -->
    <circle r="100" fill="none" stroke="url(#neon)" stroke-width="4"
            stroke-dasharray="200 200"
            style="animation: pulse 4s infinite, ringSweep 6s linear infinite"/>

    <!-- Title -->
    <text y="-6" text-anchor="middle"
          font-size="44" font-weight="900"
          font-family="Poppins,Arial"
          fill="url(#neon)" filter="url(#glow)">
      Inaya Music 
    </text>

    <!-- Tagline -->
    <text y="38" text-anchor="middle"
          font-size="16" opacity=".85"
          fill="#eaeaea"
          font-family="Poppins,Arial">
      Premium Music Visualizer
    </text>
  </g>

  <!-- Left Curved EQ Bars -->
  <g transform="translate(160,220)" fill="url(#neon)" filter="url(#glow)">
    <rect x="0"   y="-60" width="16" ry="8" style="animation:eq 1s infinite"/>
    <rect x="30"  y="-60" width="16" ry="8" style="animation:eq 1.1s infinite"/>
    <rect x="60"  y="-60" width="16" ry="8" style="animation:eq 0.95s infinite"/>
    <rect x="90"  y="-60" width="16" ry="8" style="animation:eq 1.2s infinite"/>
    <rect x="120" y="-60" width="16" ry="8" style="animation:eq 1s infinite"/>
  </g>

  <!-- Right Curved EQ Bars -->
  <g transform="translate(620,220)" fill="url(#neon)" filter="url(#glow)">
    <rect x="0"   y="-60" width="16" ry="8" style="animation:eq 1s infinite"/>
    <rect x="30"  y="-60" width="16" ry="8" style="animation:eq 1.2s infinite"/>
    <rect x="60"  y="-60" width="16" ry="8" style="animation:eq 0.95s infinite"/>
    <rect x="90"  y="-60" width="16" ry="8" style="animation:eq 1.15s infinite"/>
    <rect x="120" y="-60" width="16" ry="8" style="animation:eq 1s infinite"/>
  </g>

</svg>
